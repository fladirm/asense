name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Ubuntu 26.04 release
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install native and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev \
            libxdo-dev libssl-dev libelf-dev linux-headers-generic \
            desktop-file-utils systemd zip

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.96.0 \
            --profile minimal --component clippy,rustfmt
          rustup default 1.96.0

      - name: Verify release candidate
        run: scripts/verify-release.sh

      - name: Build release assets
        env:
          ASENSE_RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_type == 'tag' && github.ref_name || '' }}
        run: scripts/package-release.sh

      - name: Upload release-candidate assets
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: asense-v0.2.2-rc-${{ github.sha }}
          retention-days: 7
          if-no-files-found: error
          path: |
            asense-v0.2.2-*.zip
            asense-v0.2.2-*.zip.sha256
            SHA256SUMS

      - name: Publish GitHub Release assets
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "ASense v0.2.2 — Telemetry stability hotfix" \
            --notes-file docs/RELEASE_NOTES_v0.2.2.md \
            asense-v0.2.2-*.zip \
            asense-v0.2.2-*.zip.sha256 \
            SHA256SUMS
