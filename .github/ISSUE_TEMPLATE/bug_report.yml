name: Bug report
description: Report a reproducible ASense problem
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues first. Do not include serial numbers,
        UUIDs, hostnames, network addresses or private logs.

  - type: input
    id: version
    attributes:
      label: ASense version
      placeholder: v0.2.2
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Exact Acer model
      placeholder: Predator PHN16-72
    validations:
      required: true

  - type: input
    id: distribution
    attributes:
      label: Distribution and desktop
      placeholder: Ubuntu 26.04, GNOME
    validations:
      required: true

  - type: input
    id: kernel
    attributes:
      label: Kernel
      placeholder: Output of uname -r
    validations:
      required: true

  - type: input
    id: bios
    attributes:
      label: BIOS version
      placeholder: "1.18"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest sequence that reproduces the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: probe
    attributes:
      label: Compatibility report
      description: Drag asense-probe.json here after reviewing its contents.
      placeholder: Attach the JSON file generated by asense probe.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I reviewed the report and removed any information I do not want to share.
          required: true
